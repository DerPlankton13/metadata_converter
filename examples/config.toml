[input]
file_path = "examples/ReportingContinuous_WP3.xlsx"

[input.extractor]
type = "excel"
sheet_name = "Researchers"
header = 0
skiprows = [0, 1, 3, 4]
[input.cleaning]
strip_header_whitespace = true
strip_cell_whitespace = true
sentinels_to_na = true
empty_sentinels = ["", "N/A", "n/a", "-", "Please select"]
placeholders_to_na = true

[output]
output_path = "output"

[mapping]
[mapping.Person]
email = "Email"
gender = "Gender"
nationality = "Nationality"
givenName = "First Name"
familyName = "Surname"
funder = "[Beneficiary No]"
identifier = "Personal identifier e.g. ORCID (optional)"
name = "First Name + Surname"